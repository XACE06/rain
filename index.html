<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rain Glass Editor</title>
    <link rel="stylesheet" href="./src/styles/rain-glass-editor.css" />
  </head>
  <body>
    <main class="stage" aria-label="沉浸式雨滴编辑器">
      <canvas id="rain-canvas"></canvas>

      <button id="panel-toggle" class="panel-toggle" type="button" aria-label="调节雨滴效果" aria-expanded="false">
        <svg class="control-button-icon" viewBox="0 0 48 48" aria-hidden="true">
          <g class="icon-rotor">
            <path class="icon-line icon-line-top" d="M14 24H34" />
            <path class="icon-line icon-line-middle" d="M14 24H34" />
            <path class="icon-line icon-line-bottom" d="M14 24H34" />
            <circle class="icon-dot icon-dot-top" cx="18" cy="15" r="3.4" />
            <circle class="icon-dot icon-dot-middle" cx="30" cy="24" r="3.4" />
            <circle class="icon-dot icon-dot-bottom" cx="22" cy="33" r="3.4" />
          </g>
        </svg>
      </button>
      <button id="language-toggle" class="language-toggle" type="button">E</button>

      <section id="control-panel" class="control-panel" aria-label="雨滴效果参数">
        <div class="panel-header">
          <p data-i18n="panelTitle">Rain Glass</p>
        </div>

        <label class="upload-button" for="media-input">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3V15" />
            <path d="M7.5 7.5L12 3L16.5 7.5" />
            <path d="M5 14.5V19.5H19V14.5" />
          </svg>
          <span data-i18n="uploadBackground">上传背景</span>
          <input id="media-input" type="file" accept="image/*,video/*" />
        </label>

        <p class="panel-section-title" data-i18n="sectionVisual">画面</p>
        <label>
          <span data-i18n="rainAmount">雨势</span>
          <input id="rain-control" type="range" min="0" max="1" value="0.62" step="0.01" />
        </label>
        <label>
          <span data-i18n="fog">雾气</span>
          <input id="fog-control" type="range" min="0" max="1" value="0.35" step="0.01" />
        </label>
        <label>
          <span data-i18n="refraction">折射率</span>
          <input id="refraction-control" type="range" min="0" max="1" value="0.58" step="0.01" />
        </label>

        <p class="panel-section-title" data-i18n="sectionAudio">声音</p>
        <div class="sound-row">
          <button id="sound-toggle" class="sound-toggle" type="button" aria-pressed="false">开启雨声</button>
        </div>
        <label>
          <span data-i18n="masterVolume">总音量</span>
          <input id="volume-control" type="range" min="0" max="1" value="0.42" step="0.01" />
        </label>
        <label>
          <span data-i18n="rainVolume">雨声音量</span>
          <input id="rain-volume-control" type="range" min="0" max="1" value="0.86" step="0.01" />
        </label>
        <label>
          <span data-i18n="thunderVolume">雷声音量</span>
          <input id="thunder-volume-control" type="range" min="0" max="1" value="0.46" step="0.01" />
        </label>

        <p class="panel-section-title" data-i18n="sectionLightning">雷电</p>
        <label>
          <span data-i18n="lightningIntensity">雷光强度</span>
          <input id="lightning-intensity-control" type="range" min="0" max="1" value="0.55" step="0.01" />
        </label>
        <label>
          <span data-i18n="lightningFrequency">雷电频率</span>
          <input id="lightning-frequency-control" type="range" min="0" max="1" value="0.32" step="0.01" />
        </label>
        <label>
          <span data-i18n="thunderDelay">雷声延迟</span>
          <input id="thunder-delay-control" type="range" min="0" max="2.5" value="0.38" step="0.01" />
        </label>

        <p class="panel-section-title" data-i18n="sectionInteraction">交互</p>
        <label>
          <span data-i18n="mouseRadius">鼠标避让半径</span>
          <input id="mouse-radius-control" type="range" min="60" max="90" value="72" step="1" />
        </label>
      </section>
    </main>

    <script src="./src/scripts/rain-glass-editor.js"></script>
  </body>
</html>
